name: Autonomous Agent Sweeps

on:
  schedule:
    # Full sweep — every day at 6:00 AM UTC (all agents, revenue report)
    - cron: '0 6 * * *'
    # Quick health check — every 6 hours (leads, compliance, onboarding)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: "Sweep mode"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - quick

jobs:
  autonomous-sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Determine sweep mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 6 * * *" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=quick" >> $GITHUB_OUTPUT
          fi

      - name: Call autonomous sweep endpoint
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          echo "Running $MODE autonomous sweep..."
          curl --fail -s -X GET "${{ secrets.APP_URL }}/api/cron/autonomous-sweep?mode=${MODE}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -w "\n\nHTTP Status: %{http_code}\n"
