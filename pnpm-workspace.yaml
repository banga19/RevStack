packages:
  - "artifacts/*"
  - "lib/*"
  - "scripts"
allowBuilds:
  '@prisma/client': false
  '@prisma/engines': false
  '@sentry/cli': false
  better-sqlite3: false
  core-js: set this to true or false
  esbuild: false
  msgpackr-extract: set this to true or false
  prisma: false
  sharp: false
  unrs-resolver: false
catalog:
  vite: "^7.3.3"
  typescript: "^5.9.0"
  "@types/node": "^25.0.0"
  "@types/react": "^19.0.0"
  "@types/react-dom": "^19.0.0"
  "@vitejs/plugin-react": "^4.5.2"
  "@tailwindcss/vite": "^4.1.10"
  tailwindcss: "^4.1.10"
  react: "^19.1.0"
  react-dom: "^19.1.0"
  "@tanstack/react-query": "^5.80.5"
  drizzle-orm: "^0.43.1"
  zod: "^3.25.76"
  lucide-react: "^0.511.0"
  framer-motion: "^12.17.0"
  clsx: "^2.1.1"
  "tailwind-merge": "^3.3.0"
  "class-variance-authority": "^0.7.1"
  "@replit/vite-plugin-cartographer": "^0.3.4"
  "@replit/vite-plugin-dev-banner": "^0.0.3"
  "@replit/vite-plugin-runtime-error-modal": "^0.0.3"
